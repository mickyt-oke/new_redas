<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - REDAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/images/nis.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-50">

    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-white border-end" id="sidebar-wrapper" style="width: 250px;">
            <div class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold text-uppercase border-bottom">
                <img src="../assets/images/nis.png" alt="Logo" class="me-2" style="height: 40px;">REDAS
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="#" id="dashboardLink" class="list-group-item list-group-item-action bg-transparent second-text">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent second-text active">
                    <i class="fas fa-users-cog me-2"></i>User Management
                </a>
                <a href="profile-setting.html" id="profileLink" class="list-group-item list-group-item-action bg-transparent second-text fw-bold">
                    <i class="fas fa-user-cog me-2"></i>Profile Settings
                </a>
                <a href="../index.html" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-2">
                    <i class="fas fa-power-off me-2"></i>Logout
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-4 px-4 border-bottom">
                <div class="d-flex align-items-center">
                    <i class="fas fa-align-left primary-text fs-4 me-3" id="menu-toggle"></i>
                    <h2 class="fs-2 m-0">User Management</h2>
                </div>
                <div class="ms-auto d-flex align-items-center">
                    <span class="text-muted me-3">System Administration</span>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <div class="row my-4">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white fw-bold border-bottom d-flex justify-content-between align-items-center">
                                <span><i class="fas fa-users me-2"></i>System Users</span>
                                <div>
                                    <input type="file" id="bulkUploadInput" class="d-none" accept=".csv">
                                    <button class="btn btn-outline-secondary btn-sm me-2" onclick="document.getElementById('bulkUploadInput').click()">
                                        <i class="fas fa-file-upload me-2"></i>Bulk Upload
                                    </button>
                                    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addUserModal"><i class="fas fa-user-plus me-2"></i>Add New User</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <!-- Filters -->
                                <div class="row g-2 mb-3">
                                    <div class="col-md-4">
                                        <input type="text" id="userSearch" class="form-control form-control-sm" placeholder="Search by Name or Service No...">
                                    </div>
                                    <div class="col-md-3">
                                        <select class="form-select form-select-sm" id="roleFilter">
                                            <option value="">All Roles</option>
                                            <option value="State Comptroller">State Comptroller</option>
                                            <option value="Zonal Coordinator">Zonal Coordinator</option>
                                            <option value="HQ Admin">HQ Admin</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="bg-light">
                                            <tr>
                                                <th>Service No.</th>
                                                <th>Full Name</th>
                                                <th>Email</th>
                                                <th>Role</th>
                                                <th>Command/Unit</th>
                                                <th>Status</th>
                                                <th class="text-end">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="usersTableBody">
                                            <!-- Populated by JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="newUserName" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Service Number</label>
                                <input type="text" class="form-control" id="newUserServiceNo" placeholder="NIS/..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Role</label>
                                <select class="form-select" id="newUserRole" required>
                                    <option value="">Select...</option>
                                    <option value="State Comptroller">State Comptroller</option>
                                    <option value="Zonal Coordinator">Zonal Coordinator</option>
                                    <option value="HQ Admin">HQ Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="newUserEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Command / Unit</label>
                            <input type="text" class="form-control" id="newUserCommand" placeholder="e.g. Lagos State Command" required>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="newUserForcePasswordChange">
                            <label class="form-check-label" for="newUserForcePasswordChange">Force password change on next login</label>
                        </div>
                        <div class="modal-footer px-0 pb-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit User Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="editUserTabs" role="tablist">
                        <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#detailsTab" type="button">Details</button></li>
                        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#auditTab" type="button">Audit Log</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="detailsTab" role="tabpanel">
                            <form id="editUserForm" class="needs-validation" novalidate>
                                <input type="hidden" id="editUserId">
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="editUserName" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6"><label class="form-label">Service Number</label><input type="text" class="form-control" id="editUserServiceNo" required></div>
                                    <div class="col-md-6"><label class="form-label">Role</label><select class="form-select" id="editUserRole" required><option value="State Comptroller">State Comptroller</option><option value="Zonal Coordinator">Zonal Coordinator</option><option value="HQ Admin">HQ Admin</option><option value="Officer">Officer</option></select></div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="editUserEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Command / Unit</label>
                                    <input type="text" class="form-control" id="editUserCommand" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Status</label>
                                        <select class="form-select" id="editUserStatus">
                                            <option value="Active">Active</option>
                                            <option value="Inactive">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 d-flex align-items-end">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="editUserForcePasswordChange">
                                            <label class="form-check-label" for="editUserForcePasswordChange">Force password change</label>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="auditTab" role="tabpanel">
                            <div id="auditLogList" class="list-group list-group-flush" style="max-height: 300px; overflow-y: auto;">
                                <!-- Audit log items will be injected here -->
                            </div>
                        </div>
                        <div class="modal-footer px-0 pb-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1100"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Dark Mode Logic
        const toggleSwitch = document.querySelector('#darkModeSwitch');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            toggleSwitch.checked = true;
        }

        toggleSwitch.addEventListener('change', function(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Dynamic Back Link Logic ---
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role') || 'hq';
            const dashboardLink = document.getElementById('dashboardLink');
            const profileLink = document.getElementById('profileLink');
            
            if(role === 'state') {
                dashboardLink.href = 'dashboard-state.html';
                dashboardLink.innerHTML = '<i class="fas fa-tachometer-alt me-2"></i>State Dashboard';
                profileLink.href = 'profile-settings.html';
            } else if (role === 'zonal') {
                dashboardLink.href = 'dashboard-zonal.html';
                dashboardLink.innerHTML = '<i class="fas fa-tachometer-alt me-2"></i>Zonal Dashboard';
                profileLink.href = 'profile-zonal.html';
            } else {
                dashboardLink.href = 'dashboard-hq.html';
                dashboardLink.innerHTML = '<i class="fas fa-tachometer-alt me-2"></i>HQ Dashboard';
                profileLink.href = 'profile-setting.html';
            }

            // --- Mock Data ---
            let users = [
                { id: 1, serviceNo: 'NIS/HQ/101', name: 'Jane Doe', email: 'jane.doe@nis.gov.ng', role: 'HQ Admin', command: 'Service HQ', status: 'Active', forcePasswordChange: false },
                { id: 2, serviceNo: 'NIS/ZC/202', name: 'Ahmed Musa', email: 'ahmed.m@nis.gov.ng', role: 'Zonal Coordinator', command: 'Zone A - Lagos', status: 'Active', forcePasswordChange: false },
                { id: 3, serviceNo: 'NIS/SC/305', name: 'Chidinma Okoro', email: 'c.okoro@nis.gov.ng', role: 'State Comptroller', command: 'Lagos State Command', status: 'Active', forcePasswordChange: false },
                { id: 4, serviceNo: 'NIS/SC/308', name: 'Bello Yusuf', email: 'b.yusuf@nis.gov.ng', role: 'State Comptroller', command: 'Kano State Command', status: 'Inactive', forcePasswordChange: false },
                { id: 5, serviceNo: 'NIS/OFF/501', name: 'John Smith', email: 'j.smith@nis.gov.ng', role: 'Officer', command: 'Lagos State Command', status: 'Active', forcePasswordChange: true },
                { id: 6, serviceNo: 'NIS/OFF/502', name: 'Aliyu Dabo', email: 'a.dabo@nis.gov.ng', role: 'Officer', command: 'Kano State Command', status: 'Active', forcePasswordChange: false }
            ];
            let auditLog = [];

            const tableBody = document.getElementById('usersTableBody');

            function renderTable() {
                tableBody.innerHTML = '';
                const searchTerm = document.getElementById('userSearch').value.toLowerCase();
                const roleFilter = document.getElementById('roleFilter').value;

                // --- 1. Apply Role-Based Access Control (RBAC) ---
                let rbacUsers = users;
                if (role === 'state') {
                    // Simulate Lagos State Command context
                    rbacUsers = users.filter(u => u.command === 'Lagos State Command');
                    document.getElementById('roleFilter').parentElement.style.display = 'none'; // Hide role filter for state
                } else if (role === 'zonal') {
                    // Simulate Zone A context (Lagos & Ogun)
                    rbacUsers = users.filter(u => u.command.includes('Lagos') || u.command.includes('Ogun') || u.command.includes('Zone A'));
                }

                // --- 2. Apply Search & UI Filters ---
                const filteredUsers = rbacUsers.filter(user => {
                    const matchesSearch = user.name.toLowerCase().includes(searchTerm) || user.serviceNo.toLowerCase().includes(searchTerm);
                    const matchesRole = roleFilter === '' || user.role === roleFilter;
                    return matchesSearch && matchesRole;
                });

                filteredUsers.forEach(user => {
                    const statusBadge = user.status === 'Active' ? 'bg-success' : 'bg-secondary';
                    const row = `
                        <tr>
                            <td class="fw-bold">${user.serviceNo}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td><span class="badge bg-light text-dark border">${user.role}</span></td>
                            <td>${user.command}</td>
                            <td><span class="badge ${statusBadge}">${user.status}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-warning me-1" title="Reset Password" onclick="resetPassword(${user.id})"><i class="fas fa-key"></i></button>
                                <button class="btn btn-sm btn-outline-primary me-1" title="Edit" onclick="editUser(${user.id})"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" title="Remove" onclick="deleteUser(${user.id})"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            }

            // --- Add User Logic ---
            document.getElementById('addUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if (!this.checkValidity()) {
                    e.stopPropagation();
                    this.classList.add('was-validated');
                    return;
                }

                const newUser = {
                    id: Date.now(),
                    name: document.getElementById('newUserName').value,
                    serviceNo: document.getElementById('newUserServiceNo').value,
                    role: document.getElementById('newUserRole').value,
                    email: document.getElementById('newUserEmail').value,
                    command: document.getElementById('newUserCommand').value,
                    status: 'Active',
                    forcePasswordChange: document.getElementById('newUserForcePasswordChange').checked
                };

                users.push(newUser);
                logAction('User Created', newUser.id, newUser.name, `User account created for ${newUser.name}.`);
                renderTable();
                
                // Close Modal & Reset
                const modalEl = document.getElementById('addUserModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                this.reset();
                this.classList.remove('was-validated');
                showToast('User added successfully!', 'success');
            });

            // --- Delete User Logic ---
            window.deleteUser = function(id) {
                if(confirm('Are you sure you want to remove this user? This action cannot be undone.')) {
                    users = users.filter(u => u.id !== id);
                    renderTable();
                }
            };

            // --- Reset Password Logic ---
            window.resetPassword = function(id) {
                if(confirm('Are you sure you want to reset the password for this user? A temporary password will be sent to their email.')) {
                    const user = users.find(u => u.id === id);
                    logAction('Password Reset', id, user.name, 'Admin initiated password reset.');
                    showToast('Password reset link sent successfully.', 'success');
                }
            };

            // --- Edit User Logic ---
            window.editUser = function(id) {
                const user = users.find(u => u.id === id);
                if (!user) return;

                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUserName').value = user.name;
                document.getElementById('editUserServiceNo').value = user.serviceNo;
                document.getElementById('editUserRole').value = user.role;
                document.getElementById('editUserEmail').value = user.email;
                document.getElementById('editUserCommand').value = user.command;
                document.getElementById('editUserStatus').value = user.status;
                document.getElementById('editUserForcePasswordChange').checked = user.forcePasswordChange;

                // Populate Audit Log
                const auditLogList = document.getElementById('auditLogList');
                auditLogList.innerHTML = '';
                const userLog = auditLog.filter(log => log.userId === id).reverse();
                if (userLog.length > 0) {
                    userLog.forEach(log => {
                        const item = `
                            <div class="list-group-item">
                                <div class="d-flex w-100 justify-content-between"><h6 class="mb-1">${log.action}</h6><small class="text-muted">${log.timestamp}</small></div>
                                <p class="mb-1 small text-muted">${log.details}</p>
                            </div>`;
                        auditLogList.insertAdjacentHTML('beforeend', item);
                    });
                } else {
                    auditLogList.innerHTML = '<div class="list-group-item text-muted">No activity recorded for this user.</div>';
                }
                new bootstrap.Modal(document.getElementById('editUserModal')).show();
            };

            document.getElementById('editUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const id = parseInt(document.getElementById('editUserId').value);
                const userIndex = users.findIndex(u => u.id === id);

                if (userIndex !== -1) {
                    users[userIndex].name = document.getElementById('editUserName').value;
                    users[userIndex].serviceNo = document.getElementById('editUserServiceNo').value;
                    users[userIndex].role = document.getElementById('editUserRole').value;
                    users[userIndex].email = document.getElementById('editUserEmail').value;
                    users[userIndex].command = document.getElementById('editUserCommand').value;
                    users[userIndex].status = document.getElementById('editUserStatus').value;
                    users[userIndex].forcePasswordChange = document.getElementById('editUserForcePasswordChange').checked;

                    renderTable();
                    logAction('User Modified', id, users[userIndex].name, 'User details were updated.');
                    bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                    showToast('User details updated successfully.', 'success');
                }
            });

            // --- Bulk Upload Logic ---
            document.getElementById('bulkUploadInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const text = event.target.result;
                    const rows = text.split('\n');
                    let addedCount = 0;

                    // Simple CSV parsing (ServiceNo, Name, Email, Role, Command)
                    rows.forEach((row, index) => {
                        if (index === 0 && row.toLowerCase().includes('service')) return; // Skip header
                        const cols = row.split(',');
                        if (cols.length >= 5) {
                            users.push({
                                id: Date.now() + index,
                                serviceNo: cols[0].trim(),
                                name: cols[1].trim(),
                                email: cols[2].trim(),
                                role: cols[3].trim(),
                                command: cols[4].trim(),
                                status: 'Active',
                                forcePasswordChange: true // Force change for all bulk uploads
                            });
                            addedCount++;
                        }
                    });
                    renderTable();
                    showToast(`${addedCount} users uploaded successfully.`, 'success');
                    e.target.value = ''; // Reset input
                };
                reader.readAsText(file);
            });

            // --- Audit Log Function ---
            function logAction(action, userId, userName, details) {
                auditLog.push({
                    timestamp: new Date().toLocaleString(),
                    action: action,
                    userId: userId,
                    details: details
                });
            }

            // --- Toast Notification Logic ---
            function showToast(message, type = 'success') {
                const toastContainer = document.getElementById('toastContainer');
                const toastId = 'toast-' + Date.now();
                const bgClass = type === 'success' ? 'bg-success' : 'bg-danger';
                
                const toastHTML = `
                    <div id="${toastId}" class="toast align-items-center text-white ${bgClass} border-0" role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body"><i class="fas fa-info-circle me-2"></i>${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>`;
                
                toastContainer.insertAdjacentHTML('beforeend', toastHTML);
                const toastEl = document.getElementById(toastId);
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
                
                // Remove from DOM after hidden
                toastEl.addEventListener('hidden.bs.toast', () => {
                    toastEl.remove();
                });
            }

            // Listeners
            document.getElementById('userSearch').addEventListener('input', renderTable);
            document.getElementById('roleFilter').addEventListener('change', renderTable);

            // Initial Render
            renderTable();
        });
    </script>
</body>
</html>
